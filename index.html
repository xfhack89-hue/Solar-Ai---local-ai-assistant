<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Solar AI — личный ассистент</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="../public/icon-192.png">
  <link rel="apple-touch-icon" href="../public/icon-192.png">
  <meta name="theme-color" content="#0a0c15">
  <meta name="description" content="Локальный ИИ в телефоне. Общайтесь, работайте с файлами, генерируйте идеи — полностью приватно.">
  <style>
    /* ========== RESET & ГЛОБАЛЬНЫЕ СТИЛИ ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c15, #03050b);
      font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
      color: #edeef2;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* главный контейнер — как нативный мессенджер */
    .app {
      max-width: 600px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(8, 12, 20, 0.72);
      backdrop-filter: blur(2px);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
    }

    /* ========== ШАПКА С НЕОНОМ ========== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 180, 216, 0.3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: #00d4ff;
      border-radius: 20px;
      box-shadow: 0 0 8px #00d4ff;
      animation: pulseGlow 1.8s infinite;
    }

    h1 {
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #ffffff, #9ad8ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,212,255,0.2);
    }

    .actions {
      display: flex;
      gap: 14px;
    }

    .actions button {
      background: rgba(30, 40, 55, 0.7);
      border: none;
      font-size: 1.4rem;
      padding: 8px 12px;
      border-radius: 40px;
      color: #ccdeee;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      font-weight: 500;
    }

    .actions button:hover {
      background: #1e2a3a;
      transform: scale(0.96);
      color: #00d4ff;
      box-shadow: 0 0 6px cyan;
    }

    /* статусная строка с индикацией загрузки */
    .status {
      padding: 10px 20px;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      background: #0f111acc;
      border-bottom: 1px solid #2c3344;
      color: #b7c9e2;
    }

    .badge {
      background: #1e2a3a;
      padding: 4px 12px;
      border-radius: 40px;
      font-family: monospace;
      font-weight: 500;
    }

    /* ========== ОСНОВНАЯ ЗОНА ЧАТА ========== */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px 16px 8px;
      gap: 12px;
    }

    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      padding-bottom: 8px;
    }

    /* стили сообщений */
    .msg {
      display: flex;
      max-width: 88%;
      animation: fadeSlideUp 0.2s ease;
    }

    .msg.user {
      align-self: flex-end;
      justify-content: flex-end;
    }

    .msg.ai {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 28px;
      line-height: 1.45;
      font-size: 0.95rem;
      word-break: break-word;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .user .bubble {
      background: linear-gradient(135deg, #0f2b3d, #0a1a28);
      border: 1px solid #2e5770;
      color: white;
      border-bottom-right-radius: 8px;
    }

    .ai .bubble {
      background: rgba(30, 40, 55, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid #3a506c;
      border-bottom-left-radius: 8px;
      color: #eef4ff;
    }

    /* анимированный индикатор печати */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: #1a2536cc;
      border-radius: 48px;
      width: fit-content;
      backdrop-filter: blur(4px);
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #86c8ff;
      border-radius: 10px;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* форма ввода — стильно для телефона */
    .input-row {
      display: flex;
      gap: 10px;
      background: #10141fcc;
      backdrop-filter: blur(16px);
      padding: 10px 12px;
      border-radius: 48px;
      margin: 12px 0 8px;
      border: 1px solid #2f3b54;
    }

    #prompt {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 8px;
      font-size: 1rem;
      color: #ffffff;
      outline: none;
    }

    #prompt::placeholder {
      color: #7f8fa4;
      font-weight: 400;
    }

    #send {
      background: #00b0d4;
      border: none;
      padding: 8px 22px;
      border-radius: 60px;
      font-weight: 600;
      color: #0a0f1a;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    #send:active {
      transform: scale(0.95);
      background: #0095b9;
    }

    .toolrow {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 8px;
    }

    #btn-tool-demo {
      background: none;
      border: 1px solid #3c4d70;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.7rem;
      color: #badaff;
    }

    /* Модальное окно настроек — красивое и мобильное */
    dialog {
      background: #101624e6;
      backdrop-filter: blur(20px);
      border-radius: 44px;
      border: 1px solid #2b4a6e;
      width: 86%;
      max-width: 340px;
      margin: auto;
      padding: 24px 20px;
      color: white;
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
    }

    .settings h3 {
      font-size: 1.8rem;
      margin-bottom: 18px;
      text-align: center;
    }

    .settings label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 500;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      background: #1f2a3e;
      border: 1px solid #3f556e;
      color: white;
      font-size: 0.9rem;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .row button {
      flex: 1;
      background: #255c77;
      border: none;
      padding: 10px;
      border-radius: 60px;
      font-weight: 600;
      color: white;
    }

    /* анимации */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.5; box-shadow: 0 0 0 0 #00d4ff77; }
      100% { opacity: 1; box-shadow: 0 0 0 6px #00d4ff00; }
    }

    /* скролл красивый для мобилы (webkit) */
    .messages::-webkit-scrollbar {
      width: 4px;
    }
    .messages::-webkit-scrollbar-track {
      background: #1f2a3e;
      border-radius: 10px;
    }
    .messages::-webkit-scrollbar-thumb {
      background: #4d7c9e;
      border-radius: 10px;
    }

    /* адаптация под совсем узкие экраны */
    @media (max-width: 480px) {
      .bubble {
        font-size: 0.88rem;
        padding: 10px 14px;
      }
      .actions button {
        font-size: 1.2rem;
        padding: 6px 10px;
      }
      h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <span class="dot"></span>
      <h1>Solar AI</h1>
    </div>
    <div class="actions">
      <button id="btn-settings" title="настройки">⚙️</button>
      <button id="btn-clear" title="очистить чат">🧹</button>
    </div>
  </header>

  <section id="status" class="status">
    <span id="runtime-badge" class="badge">Определение runtime…</span>
    <span id="init-label">Загрузка нейросети...</span>
  </section>

  <main class="chat">
    <div id="messages" class="messages"></div>

    <form id="chat-form" class="input-row">
      <input id="prompt" type="text" placeholder="Спроси меня о чём угодно (работает локально)..." autocomplete="off" />
      <button id="send" type="submit">📨 Отпр.</button>
    </form>
    <div class="toolrow">
      <button id="btn-tool-demo" title="Демо функции">⏱️ Узнать время</button>
    </div>
  </main>

  <dialog id="settings">
    <form method="dialog" class="settings">
      <h3>⚙️ Настройки</h3>
      <label>Модель (WebLLM)
        <select id="model-select">
          <option value="TinyLlama-1.1B-Chat-v0.4-q4f16_1">TinyLlama 1.1B (быстрая)</option>
          <option value="Phi-2-q4f16_1">Phi-2 (средняя)</option>
          <option value="Mistral-7B-Instruct-v0.2-q4f16_1">Mistral 7B (мощная)</option>
          <option value="Llama-3.1-8B-Instruct">Llama 3.1 8B (эксперт)</option>
        </select>
      </label>
      <label>Seed <input id="seed" type="number" min="0" step="1" value="0" /></label>
      <label>Температура <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.7" /></label>
      <div class="row">
        <button id="btn-reload-model" value="default">🔄 Загрузить модель</button>
        <button id="btn-close-settings">Закрыть</button>
      </div>
    </form>
  </dialog>
</div>

<script type="module">
  // Импорт из app.js — оставляем оригинальную логику, но уже на русском UI
  // (так как мы переписали разметку — никаких конфликтов)
  import './app.js';
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW не зарегистрирован', e));
    });
  }

  // Дополнительная адаптация интерфейса под русскоязычные статусы (если app.js их обновляет — отлично)
  // Улучшаем индикатор загрузки во время ожидания модели (поддержка оригинального статуса)
  const statusSpan = document.getElementById('init-label');
  const originalSetStatus = window.updateStatusInUI; // если нет, то просто кастом
  if (!window.updateStatusInUI) {
    // небольшой наблюдатель за текстом, сделаем чтоб точно отображало прогресс на русском
    const observer = new MutationObserver(() => {
      const statusText = statusSpan?.innerText;
      if (statusText && (statusText.includes('Loading') || statusText.includes('Init') || statusText.includes('downloading'))) {
        if (statusText.includes('downloading')) statusSpan.innerText = '📡 Загрузка весов модели...';
        else if (statusText.includes('Init')) statusSpan.innerText = '⚡ Инициализация нейросети...';
        else if (statusText.includes('Ready')) statusSpan.innerText = '✅ Готово к работе';
      }
    });
    if (statusSpan) observer.observe(statusSpan, { childList: true, subtree: true, characterData: true });
  }
</script>
</body>
</html>
